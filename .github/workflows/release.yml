name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  OBS_VERSION: "32.1.1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: libglitch.so
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            artifact: libglitch.dylib
            target: aarch64-apple-darwin

          - os: windows-latest
            artifact: glitch.dll
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Cargo caches ───────────────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**', 'glitch/**', 'build.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      # ── OBS source headers (all platforms) ─────────────────────
      # build.rs auto-generates the missing obsconfig.h stub.
      # obs-websocket is a submodule inside obs-studio, so sparse
      # checkout can't fetch it — we download the header directly.
      - name: Cache OBS source headers
        id: cache-obs-src
        uses: actions/cache@v4
        with:
          path: obs-src
          key: obs-src-${{ env.OBS_VERSION }}-v2

      - name: Checkout OBS source headers
        if: steps.cache-obs-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${{ env.OBS_VERSION }}" \
            --sparse \
            https://github.com/obsproject/obs-studio.git obs-src
          cd obs-src && git sparse-checkout set libobs

      - name: Download obs-websocket header
        run: |
          mkdir -p obs-src/plugins/obs-websocket/lib
          if [ ! -f obs-src/plugins/obs-websocket/lib/obs-websocket-api.h ]; then
            curl -sL -o obs-src/plugins/obs-websocket/lib/obs-websocket-api.h \
              "https://raw.githubusercontent.com/obsproject/obs-websocket/master/lib/obs-websocket-api.h"
          fi

      # ── Linux ──────────────────────────────────────────────────
      # Ubuntu 24.04 ships OBS 30.x — satisfies our >= 28.0 req.
      # libobs-dev provides headers, pkg-config, and link libs.
      - name: Install OBS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libobs-dev

      - name: Set OBS paths (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "OBS_INCLUDE_PATH=${{ github.workspace }}/obs-src/plugins/obs-websocket/lib" >> "$GITHUB_ENV"

      # ── Windows ────────────────────────────────────────────────
      # Choco installs obs.dll but NOT obs.lib (import library).
      # We generate obs.lib from obs.dll using MSVC dumpbin + lib.
      - name: Install OBS (Windows)
        if: runner.os == 'Windows'
        run: choco install obs-studio -y --no-progress

      - name: Set OBS paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $obsDir = "${env:ProgramFiles}\obs-studio"
          $dll = Get-ChildItem -Recurse -Filter "obs.dll" $obsDir -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if (-not $dll) { throw "obs.dll not found in $obsDir" }
          $dllDir = $dll.DirectoryName

          # Locate MSVC tools
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
                      -latest -property installationPath
          $msvcVer = (Get-ChildItem "$vsPath\VC\Tools\MSVC" |
                      Sort-Object Name -Descending | Select-Object -First 1).Name
          $toolDir = "$vsPath\VC\Tools\MSVC\$msvcVer\bin\HostX64\x64"

          # Generate obs.lib from obs.dll
          $dump = & "$toolDir\dumpbin.exe" /exports $dll.FullName
          $def = @("LIBRARY obs", "EXPORTS")
          foreach ($line in $dump) {
            if ($line -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)') {
              $def += "    $($Matches[1])"
            }
          }
          $defPath = Join-Path $dllDir "obs.def"
          $def | Set-Content -Path $defPath -Encoding ASCII
          & "$toolDir\lib.exe" "/def:$defPath" "/out:$(Join-Path $dllDir 'obs.lib')" /machine:x64
          if (-not (Test-Path (Join-Path $dllDir "obs.lib"))) { throw "Failed to generate obs.lib" }

          echo "LIBOBS_PATH=$dllDir" >> $env:GITHUB_ENV
          $src = Resolve-Path "obs-src"
          echo "OBS_INCLUDE_PATH=${src}\libobs;${src}\plugins\obs-websocket\lib" >> $env:GITHUB_ENV

      # ── macOS ──────────────────────────────────────────────────
      # brew --cask obs gives us the .app bundle (no headers).
      # We use OBS source headers + auto-generated obsconfig.h stub.
      # simde is needed for SSE emulation headers on ARM.
      - name: Install OBS (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask obs
          brew install simde

      - name: Set OBS paths (macOS)
        if: runner.os == 'macOS'
        run: |
          OBS_FW="/Applications/OBS.app/Contents/Frameworks"
          mkdir -p /tmp/obs-lib

          # OBS.app ships libobs inside a macOS framework bundle, but
          # obs-sys expects a plain libobs.0.dylib.  Create a symlink.
          if [ -f "$OBS_FW/libobs.0.dylib" ]; then
            ln -sf "$OBS_FW/libobs.0.dylib" /tmp/obs-lib/libobs.0.dylib
          elif [ -f "$OBS_FW/libobs.framework/libobs" ]; then
            ln -sf "$OBS_FW/libobs.framework/libobs" /tmp/obs-lib/libobs.0.dylib
          fi
          ls -la /tmp/obs-lib/

          echo "LIBOBS_PATH=/tmp/obs-lib" >> "$GITHUB_ENV"
          SIMDE_PREFIX="$(brew --prefix simde)"
          echo "OBS_INCLUDE_PATH=${{ github.workspace }}/obs-src/libobs:${{ github.workspace }}/obs-src/plugins/obs-websocket/lib:${SIMDE_PREFIX}/include" >> "$GITHUB_ENV"

      # ── Build ──────────────────────────────────────────────────
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glitch-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Release (only on version tags) ───────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: artifacts/glitch-*/*
