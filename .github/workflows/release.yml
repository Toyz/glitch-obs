name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  OBS_VERSION: "32.1.1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: libglitch.so
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            artifact: libglitch.dylib
            target: aarch64-apple-darwin

          - os: windows-latest
            artifact: glitch.dll
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Cargo caches ───────────────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**', 'glitch/**', 'build.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      # ── OBS source headers (all platforms) ─────────────────────
      # obs-websocket-api.h is NOT in libobs-dev, only in the OBS
      # source tree, so we sparse-checkout the dirs we need.
      - name: Cache OBS source headers
        id: cache-obs-src
        uses: actions/cache@v4
        with:
          path: obs-src
          key: obs-src-${{ env.OBS_VERSION }}

      - name: Checkout OBS source headers
        if: steps.cache-obs-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${{ env.OBS_VERSION }}" \
            --sparse \
            https://github.com/obsproject/obs-studio.git obs-src
          cd obs-src && git sparse-checkout set libobs plugins/obs-websocket/lib

      # ── Linux ──────────────────────────────────────────────────
      - name: Install OBS library (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libobs-dev

      - name: Set OBS paths (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "OBS_INCLUDE_PATH=${{ github.workspace }}/obs-src/libobs:${{ github.workspace }}/obs-src/plugins/obs-websocket/lib" >> "$GITHUB_ENV"

      # ── Windows ────────────────────────────────────────────────
      - name: Cache OBS release (Windows)
        if: runner.os == 'Windows'
        id: cache-obs-win
        uses: actions/cache@v4
        with:
          path: obs-release
          key: windows-obs-release-${{ env.OBS_VERSION }}

      - name: Download OBS release (Windows)
        if: runner.os == 'Windows' && steps.cache-obs-win.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/obsproject/obs-studio/releases/download/${{ env.OBS_VERSION }}/OBS-Studio-${{ env.OBS_VERSION }}-Windows-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile obs.zip -UseBasicParsing
          Expand-Archive obs.zip -DestinationPath obs-release

      - name: Set OBS paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Recurse -Filter "obs.dll" obs-release |
                 Select-Object -First 1
          $dllDir = $dll.DirectoryName
          $src = Resolve-Path "obs-src"

          echo "LIBOBS_PATH=$dllDir"                                       >> $env:GITHUB_ENV
          echo "OBS_INCLUDE_PATH=${src}\libobs;${src}\plugins\obs-websocket\lib" >> $env:GITHUB_ENV

      # ── macOS ──────────────────────────────────────────────────
      - name: Install OBS and SIMDE (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask obs
          brew install simde

      - name: Set OBS paths (macOS)
        if: runner.os == 'macOS'
        run: |
          # obs-sys looks here automatically, but set LIBOBS_PATH to be safe
          if [ -d "/Applications/OBS.app/Contents/Frameworks" ]; then
            echo "LIBOBS_PATH=/Applications/OBS.app/Contents/Frameworks" >> "$GITHUB_ENV"
          fi
          SIMDE_PREFIX="$(brew --prefix simde)"
          echo "OBS_INCLUDE_PATH=${{ github.workspace }}/obs-src/libobs:${{ github.workspace }}/obs-src/plugins/obs-websocket/lib:${SIMDE_PREFIX}/include" >> "$GITHUB_ENV"

      # ── Build ──────────────────────────────────────────────────
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glitch-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Release (only on version tags) ───────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: artifacts/glitch-*/*
